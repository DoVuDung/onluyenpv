name: 🐞 Report a Bug
description: Report an issue with the UI, CQRS backend, or SM-2 spaced repetition calculation
title: "[BUG]: <Brief description of the issue>"
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Provide a clear explanation of what went wrong.
      placeholder: When submitting a coding challenge attempt in live contest mode, the Socket.io leaderboard rank did not immediately update...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '/contests/123'
        2. Enter solution inside Monaco Editor
        3. Click 'Submit to Live Arena'
        4. Observe console error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output or Screenshots
      description: Paste any terminal errors, browser console errors, or screenshots.
      render: shell
